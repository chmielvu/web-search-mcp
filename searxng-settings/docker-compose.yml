# SearXNG for AI Coding Agents - Docker Compose
# Optimized for: Docker Desktop on Windows + MCP servers
# Fix: Uses named volumes to avoid Windows bind-mount permission issues

name: searxng-agent

services:
  valkey:
    container_name: searxng-valkey
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    volumes:
      - valkey-data:/data
    networks:
      - searxng-net
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  searxng:
    container_name: searxng-core
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    # FIX: Use named volumes instead of bind mounts for Docker Desktop compatibility
    volumes:
      - searxng-config:/etc/searxng:rw
      - searxng-data:/var/cache/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - UWSGI_WORKERS=4
      - UWSGI_THREADS=4
      # Pass settings via environment for fallback
      - SEARXNG_SECRET_KEY=a1b2c3d4e5f67890abcdef1234567890abcdef1234567890abcdef1234567890
      - SEARXNG_VALKEY_URL=valkey://searxng-valkey:6379/0
    networks:
      - searxng-net
    depends_on:
      valkey:
        condition: service_healthy
    # Security: minimal capabilities
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    # Resource limits for modest hardware
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  # Init container to copy settings into volume on first run
  searxng-init:
    container_name: searxng-init
    image: docker.io/alpine:3.20
    volumes:
      - searxng-config:/etc/searxng:rw
      # Bind mount from local file (read-only, just for copying)
      - ./searxng-config/settings.yml:/tmp/settings.yml:ro
      - ./searxng-config/limiter.toml:/tmp/limiter.toml:ro
    command: >
      sh -c "
        echo 'Syncing settings.yml and limiter.toml to config volume...';
        cp /tmp/settings.yml /etc/searxng/settings.yml;
        cp /tmp/limiter.toml /etc/searxng/limiter.toml;
        chmod 644 /etc/searxng/settings.yml /etc/searxng/limiter.toml;
        echo 'Config sync complete';
      "
    networks:
      - searxng-net
    depends_on: []

  nginx:
    container_name: searxng-nginx
    image: docker.io/nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      searxng:
        condition: service_started
    networks:
      - searxng-net

networks:
  searxng-net:
    driver: bridge

volumes:
  valkey-data:
  searxng-data:
  # Named volume for config - survives container restarts
  searxng-config:
