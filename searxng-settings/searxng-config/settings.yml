# SearXNG Settings - Minimal Clean Config for AI Agents
# Source: Research May 2026 + GitHub #2750 fixes
# IMPORTANT: ALL engines have explicit shortcuts to avoid "-" conflicts

use_default_settings:
  engines:
    keep_only:
      - wikipedia
      - mojeek
      - mwmbl
      - yandex
      - qwant
      - brave
      - duckduckgo
      - google
      - bing
      - arxiv
      - semantic scholar
      - pubmed
      - github
      - gitlab
      - stackoverflow
      - askubuntu
      - superuser
      - serverfault
      - hackernews
      - huggingface
      - ollama
      - pypi
      - npm
      - crates
      - dockerhub
      - reuters
      - unsplash
      - pixabay

general:
  instance_name: "SearXNG-Agent"
  debug: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json
  ban_time_on_fail: 1
  max_ban_time_on_fail: 10
  suspended_times:
    SearxEngineAccessDenied: 60
    SearxEngineCaptcha: 60
    SearxEngineTooManyRequests: 30
    cf_SearxEngineCaptcha: 60
    recaptcha_SearxEngineCaptcha: 60

server:
  secret_key: "a1b2c3d4e5f67890abcdef1234567890abcdef1234567890abcdef1234567890"
  limiter: true
  public_instance: false
  image_proxy: false
  method: "GET"
  port: 8080
  bind_address: "0.0.0.0"

valkey:
  url: valkey://searxng-valkey:6379/0

outgoing:
  request_timeout: 3.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
  keepalive_expiry: 10.0
  enable_http2: true
  retries: 1
  retry_on_http_error: 429

ui:
  default_theme: simple

engines:
  # === WEB / GENERAL - Reliable independent indexes ===
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    weight: 2
    disabled: false

  - name: mojeek
    engine: mojeek
    shortcut: mj
    weight: 2
    disabled: false

  - name: mwmbl
    engine: mwmbl
    shortcut: mw
    weight: 1.5
    disabled: false

  - name: yandex
    engine: yandex
    shortcut: yd
    weight: 1.5
    disabled: false

  - name: qwant
    engine: qwant
    shortcut: qw
    weight: 1
    disabled: false

  # === BLOCKED ENGINES ===
  - name: brave
    engine: brave
    shortcut: br
    disabled: true

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: true

  - name: google
    engine: google
    shortcut: go
    disabled: true

  - name: bing
    engine: bing
    shortcut: bi
    disabled: true

  # === SCIENCE / ACADEMIC ===
  - name: arxiv
    engine: arxiv
    shortcut: arx
    weight: 2.5
    disabled: false

  - name: semantic scholar
    engine: semantic_scholar
    shortcut: ss
    weight: 2.5
    disabled: false

  - name: pubmed
    engine: pubmed
    shortcut: pmed
    weight: 2
    disabled: false

  # === IT / DEVELOPER ===
  - name: github
    engine: github
    shortcut: gh
    weight: 3
    disabled: false

  - name: gitlab
    engine: gitlab
    shortcut: gl
    weight: 2
    disabled: false

  - name: stackoverflow
    engine: stackexchange
    shortcut: stof
    api_site: 'stackoverflow'
    weight: 3
    disabled: false

  - name: askubuntu
    engine: stackexchange
    shortcut: asku
    api_site: 'askubuntu'
    weight: 2
    disabled: false

  - name: superuser
    engine: stackexchange
    shortcut: suusr
    api_site: 'superuser'
    weight: 2
    disabled: false

  - name: serverfault
    engine: stackexchange
    shortcut: sfault
    api_site: 'serverfault'
    weight: 2
    disabled: false

  - name: hackernews
    engine: hackernews
    shortcut: hn
    weight: 2.5
    disabled: false

  - name: huggingface
    engine: huggingface
    shortcut: hf
    weight: 3
    disabled: false

  - name: ollama
    engine: ollama
    shortcut: ollm
    weight: 2
    disabled: false

  # === PACKAGES ===
  - name: pypi
    engine: pypi
    shortcut: pypipkg
    weight: 2.5
    disabled: false

  - name: npm
    engine: npm
    shortcut: npmpkg
    weight: 2.5
    disabled: false

  - name: crates
    engine: crates
    shortcut: rustpkg
    weight: 2
    disabled: false

  - name: dockerhub
    engine: docker_hub
    shortcut: dockerimg
    weight: 2
    disabled: false

  # === NEWS ===
  - name: reuters
    engine: reuters
    shortcut: reut
    weight: 2
    disabled: false

  # === IMAGES ===
  - name: unsplash
    engine: unsplash
    shortcut: unspl
    weight: 2
    disabled: false

  - name: pixabay
    engine: pixabay
    shortcut: pixb
    weight: 2
    disabled: false

plugins:
  searx.plugins.tracker_url_remover.SXNGPlugin:
    active: true

categories_as_tabs:
  general: {}
  it: {}
  science: {}
  news: {}
  images: {}
