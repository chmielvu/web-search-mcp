# SearXNG Settings for AI Coding Agents - Research-backed configuration
# Source: SearXNG Practitioner's Guide (May 2026)
# Optimized for: smolagents, LangChain tools, MCP servers

use_default_settings: true

general:
  instance_name: "SearXNG-Agent"
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json                     # Required for LLM agent integration
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  # Shorter suspension times for faster recovery on private instance
  suspended_times:
    SearxEngineAccessDenied: 3600       # 1h (private instance: faster recovery)
    SearxEngineCaptcha: 3600            # 1h (private instance: faster recovery)
    SearxEngineTooManyRequests: 1800    # 30min (private instance: faster recovery)
    cf_SearxEngineCaptcha: 3600         # 1h (reduced from 15 days)
    recaptcha_SearxEngineCaptcha: 3600  # 1h (reduced from 7 days)

server:
  secret_key: "a1b2c3d4e5f67890abcdef1234567890abcdef1234567890abcdef1234567890"
  limiter: false               # Required for LLM agent tool calls
  public_instance: false
  image_proxy: false
  method: "GET"

valkey:
  url: valkey://searxng-valkey:6379/0

outgoing:
  request_timeout: 3.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
  keepalive_expiry: 10.0
  enable_http2: true
  retries: 1
  retry_on_http_error: 429

ui:
  default_theme: simple

engines:
  # === TIER 1: Core web search (weight 2) ===
  - name: brave
    engine: brave
    weight: 2
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    weight: 2
    disabled: false

  - name: wikipedia
    engine: wikipedia
    weight: 2
    disabled: false

  # === TIER 2: Independent indexes ===
  - name: mojeek
    engine: mojeek
    weight: 1
    disabled: false            # Enable it (disabled by default upstream)

  - name: qwant
    engine: qwant
    weight: 1
    disabled: false

  - name: yandex
    engine: yandex
    weight: 1.4
    disabled: false
    yandex_category: web       # Own massive index, good for technical queries

  # === DISABLED: Known broken (May 2026) ===
  - name: yahoo
    engine: yahoo
    inactive: true             # HTTP protocol error + first-word-only bug

  - name: wikidata
    engine: wikidata
    inactive: true             # HTTP 403 init failure

  - name: startpage
    engine: startpage
    inactive: true             # JSON parse errors since Sep 2025

  - name: google news
    engine: google_news
    inactive: true             # Broken since March 2026 (protobuf URL change)

  - name: karmasearch
    engine: karma
    inactive: true             # HTTP 403 universal

  # Bing disabled per user request - known relevance issues on long queries
  - name: bing
    engine: bing
    inactive: true

  # === Science / Academic ===
  - name: arxiv
    engine: arxiv
    categories: science
    disabled: false

  - name: google scholar
    engine: google_scholar
    categories: science
    disabled: false

  - name: semantic scholar
    engine: semantic_scholar
    categories: science
    disabled: false

  - name: pubmed
    engine: pubmed
    categories: science
    disabled: false

  # === IT / Developer tools ===
  - name: github
    engine: github
    categories: it
    disabled: false
    weight: 2

  - name: github code
    engine: github
    categories: it
    disabled: false
    weight: 2.5

  - name: stackoverflow
    engine: stackexchange
    shortcut: st
    api_site: 'stackoverflow'
    categories: [it, q&a]
    disabled: false
    weight: 2

  - name: askubuntu
    engine: stackexchange
    shortcut: asku
    api_site: 'askubuntu'
    categories: [it, q&a]
    disabled: false

  - name: superuser
    engine: stackexchange
    shortcut: su
    api_site: 'superuser'
    categories: [it, q&a]
    disabled: false

  - name: hackernews
    engine: hackernews
    categories: it
    disabled: false            # Enable it (disabled by default)

  - name: huggingface
    engine: huggingface
    categories: it
    disabled: false            # Enable it (disabled by default)

  - name: pypi
    engine: pypi
    categories: it
    disabled: false

  - name: npm
    engine: npm
    categories: it
    disabled: false

  # === News (working sources) ===
  - name: reuters
    engine: reuters
    categories: news
    disabled: false

  # === SPECIALTY: Indie/non-commercial web (custom json_engine) ===
  # Marginalia - focuses on non-commercial, personal, indie web content
  # Excellent complement to mainstream engines for niche technical queries
  - name: marginalia
    engine: json_engine
    categories: general
    url: "https://marginalia.nu/search?query={query}&js=true"
    disabled: false
    weight: 1
    timeout: 5.0

plugins:
  searx.plugins.tracker_url_remover.SXNGPlugin:
    active: true

categories_as_tabs:
  general:
  it:
  science: