# SearXNG Settings for AI Coding Agents - Docker Desktop Compatible
# Optimized for: smolagents, LangChain tools, MCP servers
# Based on operator evidence baseline with fixes for Windows/Docker Desktop

use_default_settings: true

general:
  debug: false
  instance_name: "SearXNG-Agent"
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  # Long suspension times for Cloudflare/CAPTCHA/429 - critical for reliability
  suspended_times:
    SearxEngineAccessDenied: 86400
    SearxEngineCaptcha: 86400
    SearxEngineTooManyRequests: 3600
    cf_SearxEngineCaptcha: 1296000
    cf_SearxEngineAccessDenied: 86400
    recaptcha_SearxEngineCaptcha: 604800

server:
  # Generated with: openssl rand -hex 32
  secret_key: "a1b2c3d4e5f67890abcdef1234567890abcdef1234567890abcdef1234567890"
  limiter: false
  image_proxy: false
  method: "GET"
  base_url: http://localhost:8080/

# Use redis: key for broader compatibility (SearXNG treats valkey:// URLs correctly)
redis:
  url: valkey://searxng-valkey:6379/0

outgoing:
  request_timeout: 3.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
  keepalive_expiry: 10.0
  enable_http2: true

ui:
  default_theme: simple

engines:
  # === GENERAL WEB (Reliable choices) ===
  - name: duckduckgo
    disabled: false
    timeout: 3.0
    weight: 1.4

  - name: brave
    disabled: false
    timeout: 3.0
    weight: 1.3

  - name: wikipedia
    disabled: false
    timeout: 2.5
    weight: 1.0

  # Google/Bing: Enable but with caution - may hit CAPTCHA
  - name: google
    disabled: false
    timeout: 3.0
    weight: 1.2

  - name: bing
    disabled: false
    timeout: 3.0
    weight: 1.0

  # === CODE SEARCH (HIGH PRIORITY) ===
  - name: github
    disabled: false
    timeout: 3.0
    weight: 2.0

  - name: github code
    disabled: false
    inactive: false
    ghc_auth:
      type: "none"
    ghc_highlight_matching_lines: true
    timeout: 4.0
    weight: 2.5

  - name: stackoverflow
    engine: stackexchange
    shortcut: st
    api_site: 'stackoverflow'
    categories: [it, q&a]
    disabled: false
    timeout: 3.0
    weight: 2.0

  - name: askubuntu
    engine: stackexchange
    shortcut: asku
    api_site: 'askubuntu'
    categories: [it, q&a]
    disabled: false
    timeout: 3.0
    weight: 1.4

  - name: superuser
    engine: stackexchange
    shortcut: su
    api_site: 'superuser'
    categories: [it, q&a]
    disabled: false
    timeout: 3.0
    weight: 1.4

  - name: pypi
    disabled: false
    timeout: 3.0
    weight: 1.8

  - name: npm
    disabled: false
    timeout: 3.0
    weight: 1.4

  # === AI/ML SPECIALIZED ===
  - name: huggingface
    disabled: false
    huggingface_endpoint: 'models'
    timeout: 4.0
    weight: 1.8

  - name: arxiv
    disabled: false
    timeout: 4.0
    weight: 1.5
    categories: [science]

  # === COMMUNITY/QA ===
  - name: reddit
    disabled: false
    timeout: 4.0
    weight: 0.8

  # === DISABLE NOISY/SLOW ENGINES ===
  - name: qwant
    disabled: true

  - name: yahoo
    disabled: true

plugins:
  searx.plugins.infinite_scroll.SXNGPlugin:
    active: false
  searx.plugins.tor_check.SXNGPlugin:
    active: false
  searx.plugins.tracker_url_remover.SXNGPlugin:
    active: true

categories_as_tabs:
  general:
  it:
  science: